    (function autoToggleSidebar() {
        const BREAKPOINT = 1620;

        // 核心逻辑：根据屏幕宽度强制设置 localStorage 和初始状态
        function enforceSidebarState() {
            const isWideScreen = window.innerWidth > BREAKPOINT;

            // 1. 修正 localStorage，防止 Vue 读取到旧的错误状态
            if (typeof Storage !== "undefined") {
                localStorage.setItem("larecipeSidebar", isWideScreen);
            }

            // 2. 尝试直接修改已存在的 Vue 实例（如果已经加载）
            const app = document.getElementById('app');
            if (app && app.__vue__) {
                app.__vue__.sidebar = isWideScreen;
            } else {
                // 3. 如果 Vue 还没好，确保 checkbox 的状态是对的，等待 Vue 来同步它
                const checkbox = document.getElementById('1');
                if (checkbox && checkbox.checked !== isWideScreen) {
                    // 注意：这里不触发 click，只改属性，避免多次触发事件
                    checkbox.checked = isWideScreen;
                }
            }
        }

        // 立即执行一次
        enforceSidebarState();

        // 监听窗口变化
        window.addEventListener('resize', () => {
            // 加个简单的防抖，避免频繁触发
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(enforceSidebarState, 100);
        });
    })();
</script>

    const CORRECT_PASSWORD = atob('MTIxMzE1Ng==');

    function checkPassword() {
        const input = document.getElementById('pwdInput').value;
        const errorMsg = document.getElementById('errorMsg');

        if (!input) {
            errorMsg.textContent = '请输入密码';
            return;
        }

        if (input === CORRECT_PASSWORD) {
            // 验证成功，保存状态并显示内容
            localStorage.setItem('unlock_time', Date.now());

            // 添加淡出动画
            const modal = document.getElementById('passwordModal');
            modal.style.transition = 'opacity 0.3s ease';
            modal.style.opacity = '0';

            setTimeout(() => {
                modal.style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }, 300);
        } else {
            errorMsg.textContent = '❌ 密码错误，请重试';
            const pwdInput = document.getElementById('pwdInput');
            pwdInput.value = '';
            pwdInput.focus();
        }
    }

    // 切换密码可见性
    function togglePasswordVisibility() {
        const pwdInput = document.getElementById('pwdInput');
        const toggleBtn = document.querySelector('.toggle-password');

        if (pwdInput.type === 'password') {
            pwdInput.type = 'text';
            toggleBtn.textContent = '🙈';
        } else {
            pwdInput.type = 'password';
            toggleBtn.textContent = '👁️';
        }
        pwdInput.focus();
    }

</script>

<script type="module">
    // 引入 Mermaid (使用 ES Module 方式，更现代)
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

    // 1. 检测系统是否是深色模式
    const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

    // 2. 初始化配置
    mermaid.initialize({
        startOnLoad: true, // 我们手动控制渲染
        theme: isDarkMode ? 'dark' : 'default', // 自动切换主题
        securityLevel: 'loose',
        fontFamily: '"Microsoft YaHei", sans-serif', // 再次确保字体生效
        flowchart: {
            useMaxWidth: true, // 关键：让流程图宽度适应容器，而不是固定像素
            htmlLabels: true,
            useHtmlLabels: false,
            curve: 'basis'     // 线条曲线风格，更像 GitHub
        }
    });

    // 3. 处理你的特定 HTML 结构
    document.addEventListener("DOMContentLoaded", async () => {
        // 延时 1 秒执行，避免与其他脚本冲突
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // 查找所有 pre.language-mermaid
        const blocks = document.querySelectorAll('pre.language-mermaid');

        for (let i = 0; i < blocks.length; i++) {
            const preBlock = blocks[i];
            const codeElement = preBlock.querySelector('code');

            if (!codeElement) continue;

            // 提取源码
            const graphDefinition = codeElement.innerText.trim();

            // 创建渲染容器
            const container = document.createElement('div');
            container.className = 'mermaid';
            container.id = `mermaid-graph-${i}`; // 唯一 ID
            container.textContent = graphDefinition;

            // 替换原有的 pre 标签
            preBlock.replaceWith(container);
        }

        // 4. 执行渲染
        await mermaid.run();
    });
</script>
</body>
</html>
